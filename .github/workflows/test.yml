name: Test

on:
  push:
  pull_request:
  workflow_call: # so publish.yml can gate on this suite (needs: tests)

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast tier — the local default (`npm test`). Tmux-free by contract (audit §2/§3): every file directly under any `__tests__/` runs here, the `full/` subdir is excluded by the single-trailing-segment glob. Deliberately NO tmux installed so the fast tier's tmux-free property stays honest — a misplaced tmux test would skip (hasTmux()=false), not fake-pass, and the full job below still runs it.
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  # Full tier (`npm run test:full`) — everything, including the 9 genuine-tmux chrome tests in src/core/__tests__/full/. These boot a REAL but isolated tmux session on the DEFAULT server (helpers/harness.ts) using scripted ops only (new-session -d, set-environment, respawn-pane, kill-session) — NO attach-session, so they run headless on a runner with no attached client/TTY. The LLM vehicle is faked: CRTR_PI_BINARY → fixtures/fake-pi-host.ts and CRTR_BROKER_ENGINE → fixtures/fake-engine.ts, so the real `pi` binary is never needed; the @earendil-works/pi-coding-agent SDK library IS needed (value imports in fake-engine) and comes in via `npm ci`. Broker unix sockets fit under the OS sun_path limit because the harness roots its canvas home at /tmp (present on ubuntu-latest).
  full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # uv must precede `npm ci`: humanloop's postinstall provisions its termrender
      # into a uv-managed venv under node_modules/@crouton-kit/humanloop/.venv
      # (a bare `pip install termrender` does nothing for it). The
      # review-render-pane regression test needs that venv to boot the render pane.
      - uses: astral-sh/setup-uv@v5
      - run: npm ci
      # Put the managed termrender on PATH for the tmux panes the full-tier review
      # test spawns. humanloop calls `termrender pane open` by the venv's absolute
      # path, but pane open bakes a BARE `termrender doc watch ...` command into
      # the split pane it opens — that sub-pane resolves `termrender` via $PATH.
      # A pristine runner has no `termrender` on PATH (the venv bin isn't on it),
      # so the watch pane dies instantly and the review surface shows nothing.
      # Exporting the venv bin here makes the tmux server (started inside
      # test:full) — and every pane it forks — resolve the bare command. A dev box
      # already has termrender on PATH, which is why this only bites CI.
      - name: Put managed termrender on PATH
        run: echo "$PWD/node_modules/@crouton-kit/humanloop/.venv/bin" >> "$GITHUB_PATH"
      # tmux hosts the panes; neovim is the review editor humanloop resolves
      # FIRST (nvim, then vim) and the one the regression test drives via its
      # <Space>s submit map. ubuntu-latest ships vim but not nvim, so without
      # this the review worker falls back to vim and the submit never fires.
      - name: Install tmux + neovim
        run: sudo apt-get update && sudo apt-get install -y tmux neovim
      - run: npm run build
      # Put THIS package's `crtr` on PATH for the tmux viewer panes the broker-host
      # full-tier tests spawn. After the broker-is-the-host cut, a node's on-screen
      # presence is a `crtr attach to <id>` VIEWER pane (placement.ts
      # openViewerWindow bakes that BARE command into the split pane); the attach
      # client self-tags its pane `@crtr_node=<id>` on connect, and three tests
      # (broker-pane-resolution, cascade-close, detach-focus) assert that tagged
      # live pane. A pristine runner has no `crtr` on PATH (the package-under-test
      # is never globally installed, and npm does not self-link its own bin into
      # node_modules/.bin), so the bare command fails, the pane dies un-tagged, and
      # those three time out. Exporting $PWD/bin (bin/crtr → dist/cli.js, built
      # above) makes the tmux server started inside test:full — and every pane it
      # forks — resolve `crtr`. A dev box already has `crtr` on PATH (global
      # install / homebrew symlink), which is why this only bites CI — same shape
      # as the managed-termrender PATH export above.
      - name: Put this package's crtr on PATH
        run: echo "$PWD/bin" >> "$GITHUB_PATH"
      - run: npm run test:full

# Runner caveats (cannot be exercised from this dev box — verify on first CI run):
#   • ubuntu-latest is the primary target: `apt-get install -y tmux` is reliable and free-tier. If the chrome tests ever prove flaky on the Linux tmux build, the alternative is `runs-on: macos-latest` with `brew install tmux` — but macOS runners cost ~10× the minutes and queue slower, so only switch the `full` job if a Linux-specific tmux bug is confirmed; keep `fast` on ubuntu regardless.
#   • The full suite was profiled at ~39s / 488 tests locally (audit §2); CI cold-start + npm ci dominate wall time.
