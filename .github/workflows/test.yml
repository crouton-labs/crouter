name: Test

on:
  push:
  pull_request:
  workflow_call: # so publish.yml can gate on this suite (needs: tests)

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast tier — the local default (`npm test`). Tmux-free by contract (audit §2/§3): every file directly under any `__tests__/` runs here, the `full/` subdir is excluded by the single-trailing-segment glob. Deliberately NO tmux installed so the fast tier's tmux-free property stays honest — a misplaced tmux test would skip (hasTmux()=false), not fake-pass, and the full job below still runs it.
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  # Full tier (`npm run test:full`) — everything, including the 9 genuine-tmux chrome tests in src/core/__tests__/full/. These boot a REAL but isolated tmux session on the DEFAULT server (helpers/harness.ts) using scripted ops only (new-session -d, set-environment, respawn-pane, kill-session) — NO attach-session, so they run headless on a runner with no attached client/TTY. The LLM vehicle is faked: CRTR_PI_BINARY → fixtures/fake-pi-host.ts and CRTR_BROKER_ENGINE → fixtures/fake-engine.ts, so the real `pi` binary is never needed; the @earendil-works/pi-coding-agent SDK library IS needed (value imports in fake-engine) and comes in via `npm ci`. Broker unix sockets fit under the OS sun_path limit because the harness roots its canvas home at /tmp (present on ubuntu-latest).
  full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # uv must precede `npm ci`: humanloop's postinstall provisions its OWN
      # termrender venv via uv and resolves the binary by absolute path inside it
      # (never $PATH — a bare `pip install termrender` does nothing for it; CI
      # finding 2026-06-10). The review-render-pane regression test needs that
      # venv to boot the live render pane.
      - uses: astral-sh/setup-uv@v5
      - run: npm ci
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - run: npm run build
      - name: DIAG renderer provisioning
        continue-on-error: true
        run: |
          set +e
          echo "=== uv / tmux ==="
          which uv && uv --version || echo "NO UV"
          which tmux && tmux -V || echo "NO TMUX"
          echo "=== venv ==="
          ls -la node_modules/@crouton-kit/humanloop/.venv/bin/ || echo "NO VENV DIR"
          node_modules/@crouton-kit/humanloop/.venv/bin/termrender -h >/dev/null 2>&1 && echo "BINARY OK" || echo "BINARY FAIL"
          node_modules/@crouton-kit/humanloop/.venv/bin/python -c 'import importlib.metadata as m; print("VER", m.version("termrender"))' 2>&1 || echo "VER FAIL"
          echo "=== one-shot render (should work) ==="
          printf '# Render check\n\n:::callout{type="info"}\nRENDER-MARKER body\n:::\n' > /tmp/diag-doc.md
          node_modules/@crouton-kit/humanloop/.venv/bin/termrender doc render --color on < /tmp/diag-doc.md 2>&1 | head -8
          TR="$PWD/node_modules/@crouton-kit/humanloop/.venv/bin/termrender"
          # Variant A: stdin = pty (real scenario). Capture isatty + exit code/signal.
          cat > /tmp/watchA.sh <<SH
          #!/bin/bash
          python3 -c 'import sys;print("A isatty(stdin)="+str(sys.stdin.isatty()))' > /tmp/watchA.diag
          $TR doc watch --color on -- /tmp/diag-doc.md >/tmp/watchA.out 2>/tmp/watchA.err
          echo "A EXIT=\$?" >> /tmp/watchA.diag
          sleep 30
          SH
          chmod +x /tmp/watchA.sh
          tmux new-session -d -s diagA -x 200 -y 50 "/tmp/watchA.sh"
          # Variant B: stdin from /dev/null (non-interactive branch -> should loop forever).
          cat > /tmp/watchB.sh <<SH
          #!/bin/bash
          $TR doc watch --color on -- /tmp/diag-doc.md </dev/null >/tmp/watchB.out 2>/tmp/watchB.err
          echo "B EXIT=\$?" >> /tmp/watchB.diag
          sleep 30
          SH
          chmod +x /tmp/watchB.sh
          rm -f /tmp/watchB.diag
          tmux new-session -d -s diagB -x 200 -y 50 "/tmp/watchB.sh"
          sleep 6
          echo "--- A pane state ---"; tmux list-panes -s -t diagA -F '#{pane_id} cmd=#{pane_current_command} dead=#{pane_dead}'
          echo "--- A diag (isatty + exit) ---"; cat -v /tmp/watchA.diag 2>&1; echo "A stderr:"; cat -v /tmp/watchA.err 2>&1 | head -20
          echo "--- B pane state (alive=non-interactive loops forever) ---"; tmux list-panes -s -t diagB -F '#{pane_id} cmd=#{pane_current_command} dead=#{pane_dead}'
          echo "--- B diag ---"; cat -v /tmp/watchB.diag 2>&1; echo "B stderr:"; cat -v /tmp/watchB.err 2>&1 | head -20
          tmux kill-session -t diagA || true; tmux kill-session -t diagB || true
      - run: npm run test:full

# Runner caveats (cannot be exercised from this dev box — verify on first CI run):
#   • ubuntu-latest is the primary target: `apt-get install -y tmux` is reliable and free-tier. If the chrome tests ever prove flaky on the Linux tmux build, the alternative is `runs-on: macos-latest` with `brew install tmux` — but macOS runners cost ~10× the minutes and queue slower, so only switch the `full` job if a Linux-specific tmux bug is confirmed; keep `fast` on ubuntu regardless.
#   • The full suite was profiled at ~39s / 488 tests locally (audit §2); CI cold-start + npm ci dominate wall time.
